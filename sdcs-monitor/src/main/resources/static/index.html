<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="3">
<title>SDCS Monitor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; }
h1 { font-size: 24px; margin-bottom: 20px; color: #58a6ff; }
h2 { font-size: 18px; margin: 24px 0 12px; color: #8b949e; }
table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #21262d; font-size: 14px; }
th { background: #161b22; color: #8b949e; font-weight: 600; position: sticky; top: 0; }
tr:hover { background: #1c2128; }
.status-online { color: #3fb950; }
.status-offline { color: #f85149; }
.status-stale { color: #d29922; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.tag-online { background: rgba(63,185,80,0.15); color: #3fb950; }
.tag-offline { background: rgba(248,81,73,0.15); color: #f85149; }
.tag-proxy { background: rgba(88,166,255,0.15); color: #58a6ff; }
.last-update { color: #484f58; font-size: 12px; margin-bottom: 16px; }
.error { color: #f85149; padding: 12px; background: rgba(248,81,73,0.1); border-radius: 6px; }
.loading { color: #484f58; padding: 12px; }
</style>
</head>
<body>
<h1>SDCS Cluster Monitor</h1>
<div id="lastUpdate" class="last-update">Loading...</div>

<h2>Server Nodes</h2>
<div id="serverContent"><div class="loading">Loading server nodes...</div></div>

<h2>Proxy Nodes</h2>
<div id="proxyContent"><div class="loading">Loading proxy nodes...</div></div>

<script>
async function fetchJSON(url) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return resp.json();
}

function ageText(secs) {
    if (secs < 0) return 'N/A';
    if (secs < 60) return secs + 's';
    if (secs < 3600) return Math.floor(secs / 60) + 'm ' + (secs % 60) + 's';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    return h + 'h ' + m + 'm';
}

function uptimeText(secs) {
    if (secs < 0) return 'N/A';
    if (secs < 60) return secs + 's';
    if (secs < 3600) return Math.floor(secs / 60) + 'm ' + (secs % 60) + 's';
    if (secs < 86400) return Math.floor(secs / 3600) + 'h ' + Math.floor((secs % 3600) / 60) + 'm';
    const d = Math.floor(secs / 86400);
    const h = Math.floor((secs % 86400) / 3600);
    return d + 'd ' + h + 'h';
}

function renderServerNodes(data) {
    const el = document.getElementById('serverContent');
    if (!data || !data.nodes || data.nodes.length === 0) {
        el.innerHTML = '<div class="error">No server nodes found</div>';
        return;
    }
    let html = '<table><thead><tr>' +
        '<th>Address</th><th>Hash Range</th><th>Status</th><th>Heartbeat</th>' +
        '</tr></thead><tbody>';
    for (const node of data.nodes) {
        const statusCls = node.stale ? 'status-stale' : (node.online ? 'status-online' : 'status-offline');
        const tagCls = node.stale ? 'tag-offline' : (node.online ? 'tag-online' : 'tag-offline');
        const statusText = node.stale ? 'STALE' : (node.online ? 'ONLINE' : 'OFFLINE');
        html += '<tr>' +
            '<td>' + escapeHtml(node.addr) + '</td>' +
            '<td>' + escapeHtml(node.hash_range) + '</td>' +
            '<td><span class="tag ' + tagCls + '">' + statusText + '</span></td>' +
            '<td class="' + statusCls + '">' + ageText(node.heartbeat_age_secs) + '</td>' +
            '</tr>';
    }
    html += '</tbody></table>';
    el.innerHTML = html;
}

function renderProxyNodes(data) {
    const el = document.getElementById('proxyContent');
    if (!data || !data.proxies || data.proxies.length === 0) {
        el.innerHTML = '<div class="loading">No proxy nodes found</div>';
        return;
    }
    let html = '<table><thead><tr>' +
        '<th>Address</th><th>Version</th><th>Uptime</th><th>Heartbeat</th>' +
        '</tr></thead><tbody>';
    for (const p of data.proxies) {
        const stale = p.heartbeat_age_secs > 30;
        const hbCls = stale ? 'status-stale' : 'status-online';
        html += '<tr>' +
            '<td><span class="tag tag-proxy">PROXY</span> ' + escapeHtml(p.addr) + '</td>' +
            '<td>' + escapeHtml(p.version || '-') + '</td>' +
            '<td>' + uptimeText(p.uptime_secs) + '</td>' +
            '<td class="' + hbCls + '">' + ageText(p.heartbeat_age_secs) + '</td>' +
            '</tr>';
    }
    html += '</tbody></table>';
    el.innerHTML = html;
}

function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function refresh() {
    try {
        const [cluster, proxies] = await Promise.all([
            fetchJSON('/cluster'),
            fetchJSON('/proxies')
        ]);
        renderServerNodes(cluster);
        renderProxyNodes(proxies);
        document.getElementById('lastUpdate').textContent =
            'Last updated: ' + new Date().toLocaleTimeString() +
            ' | Servers: ' + (cluster ? cluster.node_count : 0) +
            ' | Proxies: ' + (proxies ? proxies.proxy_count : 0);
    } catch (e) {
        document.getElementById('lastUpdate').textContent = 'Error: ' + e.message;
    }
}

// Initial load, then auto-refresh via <meta http-equiv="refresh">
refresh();
</script>
</body>
</html>
